upstream backend_servers {
    # Backend containers communicate internally on port 8080 (container's internal port)
    server backend-0:8080;
}

server {
    listen 80;

    location / {
        # Proxy to backend servers with load balancing
        proxy_pass http://backend_servers;
        
        # Forward important headers including Origin for CORS
        proxy_set_header Host $host:8080;
        proxy_set_header X-Forwarded-Host $host:8080;
        proxy_set_header X-Forwarded-Port 8080;
        proxy_set_header X-Forwarded-Proto http;

        # Extra headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Origin $http_origin;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
