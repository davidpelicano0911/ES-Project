  #     start_period: 30s

  keycloak:
    image: ${KEYCLOAK_IMAGE}
    container_name: keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HTTP_ENABLED=true
      - KC_HTTPS_ENABLED=false
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HOSTNAME_URL=${KC_HOSTNAME_URL}
      - KC_PROXY=edge
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      - KC_LOG_LEVEL=info
    ports:
      - "${KEYCLOAK_LOCAL_PORT}:${KEYCLOAK_DOCKER_PORT}"
    volumes:
      - ${KEYCLOAK_IMPORT_PATH}:/opt/keycloak/data/import
    networks:
      - app-network

  keycloak-healthcheck:
    image: busybox:latest
    container_name: keycloak-healthcheck
    depends_on:
      - keycloak
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://keycloak:${KEYCLOAK_DOCKER_PORT}/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    command: ["sh", "-c", "sleep 90; while true; do wget --spider -q http://keycloak:${KEYCLOAK_DOCKER_PORT}/health/ready || true; sleep 30; done"]

  otel-collector:
      image: otel/opentelemetry-collector-contrib:0.82.0
      container_name: otel-collector
      restart: always
      environment:
        - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
        - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS}
        - MACHINE_URL=${MACHINE_URL}
      ports:
        - "4317:4317"
        - "4318:4318"
      command: ["--config=/etc/otel-collector-config.yaml"] 
      volumes:
        - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml

  # backend and frontend are now managed by Terraform
