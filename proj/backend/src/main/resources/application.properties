spring.application.name=Marketing

# --- PostgreSQL Database ---
spring.datasource.url=jdbc:postgresql://database:5432/operimusdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:user}
spring.datasource.password=${POSTGRES_PASSWORD:password}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Use 'always' mode with idempotent SQL (INSERT ... ON CONFLICT DO NOTHING)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true

# --- Optional: Disable H2 console ---
spring.h2.console.enabled=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_ISSUER_URI}


# --- Mailjet (email service) ---
# Read credentials from environment variables exposed by Docker Compose or local env
# Using explicit Spring property keys so @Value("${mailjet.api-username}") and @Value("${mailjet.api-password}") resolve.
# If not set, leave empty to avoid startup failure in non-email flows; prefer setting them in .env
mailjet.api-username=${MAILJET_API_USERNAME:}
mailjet.api-password=${MAILJET_API_PASSWORD:}

# --- API Versioning ---
api.version=${VITE_API_VERSION:v1}
server.port=${BACKEND_DOCKER_PORT:8080}

# --- Actuator Configuration ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# --- Logging Configuration ---
logging.structured.format.console=ecs
logging.structured.format.file=ecs
logging.file.name=/var/log/marketing/marketing-app.log
logging.level.root=INFO
logging.level.io.opentelemetry=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# --- OpenTelemetry Configuration ---
management.tracing.enabled=true
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT}
otel.exporter.otlp.protocol=http/protobuf
otel.exporter.otlp.headers=Authorization=ApiKey ${OTEL_EXPORTER_OTLP_HEADERS}
otel.resource.attributes=service.name=Operimus,service.version=1.0.0,deployment.environment=prod
otel.metrics.exporter=otlp
otel.logs.exporter=otlp
otel.traces.exporter=otlp

# --- Spring AI Configuration ---
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.embedding.project-id=277954401326
spring.ai.google.genai.embedding.model=text-embedding-004
spring.ai.google.genai.chat.enabled=true
spring.ai.google.genai.embedding.enabled=true

spring.ai.google.genai.api-key=${GEMINI_API_KEY}



# --- PGVector config ---
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.table-name=documents
spring.ai.vectorstore.pgvector.dimension=768
spring.ai.vectorstore.pgvector.index-type=hnsw

llm.api.key=${GEMINI_API_KEY}
llm.api.url=https://generativelanguage.googleapis.com
llm.api.model=gemini-2.0-flash

spring.ai.chat.memory.jdbc.initialize-schema=true
# --- Keycloak Config ---
keycloak.auth-server-url=${KEYCLOAK_URL:http://localhost:8081}
keycloak.realm=${KEYCLOAK_REALM:marketing-realm}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:marketing-backend}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:}
keycloak.client-secret=my-secret
server.forward-headers-strategy=framework
# --- Keycloak Config ---
keycloak.auth-server-url=${KEYCLOAK_URL:http://localhost:8081}
keycloak.realm=${KEYCLOAK_REALM:marketing-realm}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:marketing-backend}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:}
keycloak.client-secret=my-secret
server.forward-headers-strategy=framework

# --- Facebook API Configuration ---
facebook.page.id=${FACEBOOK_PAGE_ID}
facebook.access.token=${FACEBOOK_ACCESS_TOKEN}
facebook.app.id=${FACEBOOK_APP_ID}
facebook.app.secret=${FACEBOOK_APP_SECRET}
facebook.public.page.id=${FACEBOOK_PUBLIC_PAGE_ID}


# --- HubSpot API Configuration ---
hubspot.access.token=${HUBSPOT_ACCESS_TOKEN}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

machine.url=${MACHINE_URL:http://localhost:3000}