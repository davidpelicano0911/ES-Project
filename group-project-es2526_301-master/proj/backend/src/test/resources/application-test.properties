# In-memory DB
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA behavior
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable data.sql loading (Prevents H2 Date/Time format crashes)
spring.sql.init.mode=never

# Disable Security for simple integration tests
spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration,\
org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,\
org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration,\
org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration,\
org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration,\
org.springframework.boot.actuate.autoconfigure.web.server.ManagementContextAutoConfiguration

management.endpoints.enabled-by-default=false
management.server.port=-1

# Disable OpenTelemetry
management.tracing.enabled=false
otel.traces.exporter=none
otel.metrics.exporter=none
otel.logs.exporter=none


# Disable FILE logging completely
logging.file.name=
logging.file.path=

# Lower verbosity
logging.level.root=ERROR
spring.main.banner-mode=off

# Facebook API dummy config for tests
facebook.page.id=dummy_page_id
facebook.access.token=dummy_access_token
facebook.public.page.id=dummy_public_page_id

# --- Spring AI Configuration (Google) ---
# DUMMY keys prevent startup crashes
spring.ai.google.genai.api-key=test-api-key
spring.ai.google.genai.embedding.api-key=test-api-key
spring.ai.google.genai.embedding.project-id=1234567890
spring.ai.google.genai.embedding.model=text-embedding-004
spring.ai.google.genai.chat.enabled=true
spring.ai.google.genai.embedding.enabled=true

# --- PGVector config (CRITICAL FIX) ---
# MUST be false because you are using H2, not Postgres
spring.ai.vectorstore.pgvector.initialize-schema=false
# These can stay, but they won't be used if we mock the bean
spring.ai.vectorstore.pgvector.table-name=documents
spring.ai.vectorstore.pgvector.dimension=768
spring.ai.vectorstore.pgvector.index-type=hnsw

# Custom properties
llm.api.key=test-api-key
llm.api.url=https://generativelanguage.googleapis.com
llm.api.model=gemini-2.0-flash

spring.ai.chat.memory.jdbc.initialize-schema=true

SPRING_SECURITY_ISSUER_URI=http://dummy/
SPRING_SECURITY_JWK_URI=http://dummy/jwks

# HubSpot API 
hubspot.access.token=dummy_hubspot_token