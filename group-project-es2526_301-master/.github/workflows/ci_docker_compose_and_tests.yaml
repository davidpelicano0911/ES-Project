name: CI - App Run + Tests

on:
  pull_request:
    branches: ['**']

jobs:
  backend-tests:
    runs-on: [self-hosted, es2526-301- local]

    env:
      KEYCLOAK_IMAGE: ${{ secrets.KEYCLOAK_IMAGE }}
      KEYCLOAK_ADMIN: ${{ secrets.KEYCLOAK_ADMIN }}
      KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
      KEYCLOAK_LOCAL_PORT: ${{ secrets.KEYCLOAK_LOCAL_PORT }}
      KEYCLOAK_DOCKER_PORT: ${{ secrets.KEYCLOAK_DOCKER_PORT }}
      KEYCLOAK_REALM: ${{ secrets.KEYCLOAK_REALM }}
      KEYCLOAK_IMPORT_PATH: ${{ secrets.KEYCLOAK_IMPORT_PATH }}
      KC_HOSTNAME_URL: ${{ secrets.VITE_KEYCLOAK_URL_LOCALHOST }}

      BACKEND_LOCAL_PORT: ${{ secrets.BACKEND_LOCAL_PORT }}
      BACKEND_DOCKER_PORT: ${{ secrets.BACKEND_DOCKER_PORT }}
      SPRING_PROFILES_ACTIVE: ${{ secrets.SPRING_PROFILES_ACTIVE }}
      SPRING_SECURITY_ISSUER_URI: ${{ secrets.SPRING_SECURITY_ISSUER_URI_LOCALHOST }}
      SPRING_SECURITY_JWK_URI: ${{ secrets.SPRING_SECURITY_JWK_URI }}
      
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      PG_LOCAL_PORT: ${{ secrets.PG_LOCAL_PORT }}
      PG_DOCKER_PORT: ${{ secrets.PG_DOCKER_PORT }}

      FRONTEND_LOCAL_PORT: ${{ secrets.FRONTEND_LOCAL_PORT }}
      FRONTEND_DOCKER_PORT: ${{ secrets.FRONTEND_DOCKER_PORT }}
      VITE_BACKEND_HOST: ${{ secrets.VITE_BACKEND_HOST_LOCALHOST }}
      VITE_BACKEND_PORT: ${{ secrets.VITE_BACKEND_PORT }}
      VITE_KEYCLOAK_URL: ${{ secrets.VITE_KEYCLOAK_URL_LOCALHOST }}
      VITE_UNLAYER_PUBLIC_KEY: ${{ secrets.VITE_UNLAYER_PUBLIC_KEY}}

      MAILJET_API_USERNAME: ${{ secrets.MAILJET_API_USERNAME }}
      MAILJET_API_PASSWORD: ${{ secrets.MAILJET_API_PASSWORD }}

      VITE_FLAGSMITH_ENV_ID: ${{ secrets.VITE_FLAGSMITH_ENV_ID }}

      VITE_API_VERSION: ${{ secrets.VITE_API_VERSION }}

      MACHINE_URL: "localhost"

      TF_VAR_backend_docker_port: ${{ secrets.BACKEND_DOCKER_PORT }}
      TF_VAR_frontend_docker_port: ${{ secrets.FRONTEND_DOCKER_PORT }}
      TF_VAR_spring_profiles_active: ${{ secrets.SPRING_PROFILES_ACTIVE }}
      TF_VAR_spring_security_issuer_uri: ${{ secrets.SPRING_SECURITY_ISSUER_URI_LOCALHOST }}
      TF_VAR_spring_security_jwk_uri: ${{ secrets.SPRING_SECURITY_JWK_URI }}
      TF_VAR_mailjet_api_username: ${{ secrets.MAILJET_API_USERNAME }}
      TF_VAR_mailjet_api_password: ${{ secrets.MAILJET_API_PASSWORD }}
      TF_VAR_vite_backend_host: ${{ secrets.VITE_BACKEND_HOST_LOCALHOST }}
      TF_VAR_vite_backend_port: ${{ secrets.VITE_BACKEND_PORT }}
      TF_VAR_vite_keycloak_url: ${{ secrets.VITE_KEYCLOAK_URL_LOCALHOST }}
      TF_VAR_vite_flagsmith_env_id: ${{ secrets.VITE_FLAGSMITH_ENV_ID }}
      TF_VAR_vite_api_version: ${{ secrets.VITE_API_VERSION }}
      TF_VAR_postgres_user: ${{ secrets.POSTGRES_USER }}
      TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
      TF_VAR_postgres_db: ${{ secrets.POSTGRES_DB }}
      TF_VAR_postgres_local_port: ${{ secrets.PG_LOCAL_PORT }}
      TF_VAR_postgres_docker_port: ${{ secrets.PG_DOCKER_PORT }}
      TF_VAR_frontend_lb_internal_port: ${{ secrets.FRONTEND_LB_INTERNAL_PORT }}
      TF_VAR_frontend_lb_external_port: ${{ secrets.FRONTEND_LB_EXTERNAL_PORT }}
      TF_VAR_backend_lb_internal_port: ${{ secrets.BACKEND_LB_INTERNAL_PORT }}
      TF_VAR_backend_lb_external_port: ${{ secrets.BACKEND_LB_EXTERNAL_PORT }}
      TF_VAR_backend_replicas: ${{secrets.BACKEND_REPLICAS}}
      TF_VAR_frontend_replicas: ${{secrets.FRONTEND_REPLICAS}}
      TF_VAR_otel_exporter_otlp_endpoint: ${{secrets.OTEL_EXPORTER_OTLP_ENDPOINT}}
      TF_VAR_otel_exporter_otlp_headers: ${{secrets.OTEL_EXPORTER_OTLP_HEADERS}}
      TF_VAR_google_project_id: ${{secrets.GOOGLE_PROJECT_ID}}
      TF_VAR_gemini_api_key: ${{secrets.GEMINI_API_KEY}}
      TF_VAR_facebook_access_token: ${{secrets.FACEBOOK_ACCESS_TOKEN}}
      TF_VAR_facebook_app_id: ${{secrets.FACEBOOK_APP_ID}}
      TF_VAR_facebook_app_secret: ${{secrets.FACEBOOK_APP_SECRET}}
      TF_VAR_facebook_page_id: ${{secrets.FACEBOOK_PAGE_ID}}
      TF_VAR_facebook_public_page_id: ${{secrets.FACEBOOK_PUBLIC_PAGE_ID}}
      TF_VAR_hubspot_access_token: ${{secrets.HUBSPOT_ACCESS_TOKEN}}
      TF_VAR_machine_url: "localhost"


    steps:
      - uses: actions/checkout@v3

      - name: Terraform Init
        run:  |
          cd proj
          terraform init
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      
      - name: Debug file path
        run: |
          cd proj
          echo "Checking nginx-frontend.conf path..."
          pwd
          ls -l nginx-frontend.conf


      - name: Start infrastructure with Terraform
        run: |
          cd proj
          printenv > .env
          terraform apply -auto-approve
          echo "Waiting for backend and frontend services..."
      - name: Wait for backend health endpoint
        run: |
          echo "⏳ Waiting for backend health endpoint on http://localhost:${{ secrets.BACKEND_LB_EXTERNAL_PORT }}/actuator/health ..."
          max_wait=200
          start=$SECONDS
          until curl -sf "http://localhost:${{ secrets.BACKEND_LB_EXTERNAL_PORT }}/actuator/health" | grep -q '"status":"UP"'; do
            (( SECONDS - start >= max_wait )) && { echo "⛔ Timeout waiting for backend health endpoint"; exit 1; }
            sleep 5
          done
          echo "✅ Backend is healthy (status: UP)"
      
      - name: Wait for frontend to become healthy
        run: |
          echo "⏳ Waiting for frontend on port 3000..."
          max_wait=60
          start=$SECONDS
          until curl -s "http://localhost:3000" > /dev/null; do
            (( SECONDS - start >= max_wait )) && { echo "⛔ Timeout waiting for frontend"; exit 1; }
            sleep 5
          done
          echo "✅ Frontend is healthy"
      
      - name: Wait for frontend to become healthy
        run: |
          echo "⏳ Waiting for frontend on port ${{ secrets.FRONTEND_LB_EXTERNAL_PORT }}..."
          max_wait=60
          start=$SECONDS
          until curl -s "http://localhost:${{ secrets.FRONTEND_LB_EXTERNAL_PORT }}" > /dev/null; do
            (( SECONDS - start >= max_wait )) && { echo "⛔ Timeout waiting for frontend"; exit 1; }
            sleep 5
          done
          echo "✅ Frontend is healthy"
      
      - name: Wait for Keycloak to become healthy
        run: |
          echo "⏳ Waiting for Keycloak on port ${{ secrets.KEYCLOAK_LOCAL_PORT }}..."
          max_wait=90
          start=$SECONDS
          until curl -sf "http://localhost:${{ secrets.KEYCLOAK_LOCAL_PORT }}/realms/${{ secrets.KEYCLOAK_REALM }}" > /dev/null; do
            (( SECONDS - start >= max_wait )) && { echo "⛔ Timeout waiting for Keycloak"; exit 1; }
            echo "Still waiting for Keycloak..."
            sleep 5
          done
          echo "✅ Keycloak is healthy and realm is accessible"
      
      
      - name: Debug frontend configuration
        run: |
          echo "🔍 Checking frontend configuration..."
          echo "TF_VAR_vite_keycloak_url = $TF_VAR_vite_keycloak_url"
          echo "Checking frontend JavaScript bundle for Keycloak URL..."
          curl -s http://localhost:3000 > /tmp/frontend.html
          # Extract main JS file
          JS_FILE=$(grep -o '/assets/index-[^"]*\.js' /tmp/frontend.html | head -1)
          if [ -n "$JS_FILE" ]; then
            echo "Found JS bundle: $JS_FILE"
            curl -s "http://localhost:3000$JS_FILE" | grep -o 'http[s]*://[^"]*8081[^"]*' | head -5 || echo "No Keycloak URL found in JS bundle"
          else
            echo "Could not find JS bundle"
          fi
          echo ""
          echo "Testing if browser can reach Keycloak from test perspective..."
          curl -s http://localhost:${{ secrets.KEYCLOAK_LOCAL_PORT }}/realms/${{ secrets.KEYCLOAK_REALM }} | jq '.realm' || echo "Keycloak realm not accessible"
      
      - name: Test manual navigation to frontend
        run: |
          echo "🌐 Testing what happens when accessing frontend..."
          echo "First request to frontend:"
          curl -sL -D - http://localhost:3000/ -o /dev/null 2>&1 | head -20
          echo ""
          echo "Checking if frontend serves content:"
          curl -s http://localhost:3000/ | head -50
          echo ""
          echo "🔍 Extracting Keycloak URL from JavaScript bundle..."
          curl -s http://localhost:3000/assets/index-85G8emY6.js | grep -o 'url:"http[^"]*8081[^"]*"' | head -5
          curl -s http://localhost:3000/assets/index-85G8emY6.js | grep -o 'VITE_KEYCLOAK_URL[^,}]*' | head -5
      
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
      
      - name: Final pre-test verification
        run: |
          echo "🔍 Final checks before running tests..."
          echo ""
          echo "Backend health:"
          curl -s http://localhost:${{ secrets.BACKEND_LB_EXTERNAL_PORT }}/actuator/health || echo "❌ Backend not responding"
          echo ""
          echo "Frontend accessibility:"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" http://localhost:3000/
          echo ""
          echo "Keycloak realm:"
          curl -s http://localhost:${{ secrets.KEYCLOAK_LOCAL_PORT }}/realms/${{ secrets.KEYCLOAK_REALM }} | jq -r '.realm' || echo "❌ Keycloak realm not accessible"
          echo ""
          echo "All services verified - ready to run tests! 🚀"

      - name: Run backend tests
        run: mvn -B test --file proj/backend/pom.xml

      - name: Tear down infrastructure with Terraform
        if: always()
        run: |
          cd proj
          terraform destroy -auto-approve
          docker image prune -a -f
